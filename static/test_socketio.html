<!DOCTYPE html>
<html>
<head>
    <title>SocketIO Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <h1>SocketIO Connection Test</h1>
    <div>
        <input type="text" id="messageInput" placeholder="Type a message">
        <button onclick="sendMessage()">Send</button>
    </div>
    <div id="messages"></div>

    <script>
        const socket = io('http://127.0.0.1:5000');
        const messagesDiv = document.getElementById('messages');
        
        socket.on('connect', () => {
            addMessage('Connected to server: ' + socket.id);
        });
        
        socket.on('disconnect', () => {
            addMessage('Disconnected from server');
        });
        
        socket.on('error', (data) => {
            addMessage('Error: ' + data.message);
        });
        
        socket.on('chat_history', (data) => {
            addMessage('Chat history received: ' + JSON.stringify(data));
        });
        
        socket.on('new_message', (data) => {
            addMessage('New message: ' + JSON.stringify(data));
        });
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message) {
                socket.emit('send_message', {
                    message: message,
                    receiver_id: 2  // Test with user ID 2
                });
                input.value = '';
            }
        }
        
        function addMessage(message) {
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Test joining chat
        setTimeout(() => {
            socket.emit('join_chat', { other_user_id: 2 });
        }, 2000);
    </script>
</body>
</html>
