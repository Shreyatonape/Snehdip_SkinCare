<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-selection {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .user-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: white;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            max-width: 70%;
        }

        .message.sent {
            justify-content: flex-end;
            margin-left: auto;
        }

        .message.received {
            justify-content: flex-start;
            margin-right: auto;
        }

        .message-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #007bff;
            color: white;
        }

        .message.received .message-bubble {
            background: #e9ecef;
            color: #333;
        }

        .message-time {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .message.received .message-time {
            text-align: left;
        }

        .chat-input-container {
            display: flex;
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #ddd;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        .send-btn {
            margin-left: 10px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .send-btn:hover {
            background: #0056b3;
        }

        .send-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .empty-chat {
            text-align: center;
            color: #666;
            padding: 50px;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .delete-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin: 20px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .info-message {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <span id="chatWith">Select a patient</span>
        <button id="deleteBtn" class="delete-btn" style="display: none;" onclick="deleteChat()">Delete Chat</button>
    </div>

    <div class="user-selection">
        <select class="user-select" id="patientSelect">
            <option value="">-- Loading patients... --</option>
        </select>
    </div>

    <div class="chat-messages" id="chatBox">
        <div class="loading">Loading chat...</div>
    </div>

    <div class="chat-input-container">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." disabled>
        <button class="send-btn" id="sendBtn" disabled>Send</button>
    </div>

    <script>
        let selectedPatientId = null;
        let pollingInterval = null;
        let currentUser = null;

        const chatBox = document.getElementById("chatBox");
        const chatInput = document.getElementById("chatInput");
        const sendBtn = document.getElementById("sendBtn");
        const chatWith = document.getElementById("chatWith");
        const patientSelect = document.getElementById("patientSelect");
        const deleteBtn = document.getElementById("deleteBtn");

        // Get current user from token
        function getCurrentUserFromToken() {
            const token = localStorage.getItem('token');
            if (!token) {
                console.error('No token found');
                return null;
            }

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return {
                    id: payload.user_id,
                    role: payload.role
                };
            } catch (error) {
                console.error('Error parsing token:', error);
                return null;
            }
        }

        // Load ALL registered patients
        async function loadPatients() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    chatBox.innerHTML = '<div class="error-message">Please login first</div>';
                    return;
                }

                console.log('Loading all registered patients...');
                const response = await fetch('/api/messages/contacts', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                console.log('Patients response:', data);

                if (data.success) {
                    patientSelect.innerHTML = '<option value="">-- Select Patient --</option>';

                    if (data.contacts.length === 0) {
                        patientSelect.innerHTML = '<option value="">-- No patients available --</option>';
                        chatBox.innerHTML = '<div class="info-message">No registered patients found. Please contact admin.</div>';
                        return;
                    }

                    data.contacts.forEach(patient => {
                        const option = document.createElement('option');
                        option.value = patient.id;
                        option.textContent = patient.name;
                        patientSelect.appendChild(option);
                    });

                    chatBox.innerHTML = '<div class="empty-chat">Please select a patient to start chatting</div>';
                    console.log(`Loaded ${data.contacts.length} patients`);
                } else {
                    console.error('Failed to load patients:', data.error);
                    chatBox.innerHTML = `<div class="error-message">Failed to load patients: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error loading patients:', error);
                chatBox.innerHTML = '<div class="error-message">Error loading patients. Please check your connection.</div>';
            }
        }

        // Handle patient selection
        patientSelect.addEventListener('change', async (e) => {
            selectedPatientId = e.target.value;
            console.log('Patient selected:', selectedPatientId);

            // Clear polling
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }

            if (!selectedPatientId) {
                resetChatUI();
                return;
            }

            const patientName = e.target.options[e.target.selectedIndex].textContent;
            chatWith.textContent = `Chat with ${patientName}`;
            deleteBtn.style.display = 'inline-block';

            // Load messages
            await loadConversation(selectedPatientId);

            // Enable chat input
            chatInput.disabled = false;
            sendBtn.disabled = false;

            // Start polling
            startPolling();
        });

        // Load conversation with selected patient
        async function loadConversation(patientId) {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    console.error('No token found');
                    return;
                }

                console.log('Loading conversation with patient:', patientId);
                const response = await fetch(`/api/messages/conversation/${patientId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                console.log('Conversation response:', data);

                if (data.success) {
                    displayConversation(data.conversation);
                } else {
                    console.error('Failed to load conversation:', data.error);
                    chatBox.innerHTML = `<div class="error-message">Failed to load conversation: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error loading conversation:', error);
                chatBox.innerHTML = '<div class="error-message">Error loading conversation. Please try again.</div>';
            }
        }

        // Display conversation
        function displayConversation(conversation) {
            chatBox.innerHTML = '';

            if (conversation.length === 0) {
                chatBox.innerHTML = `
                    <div class="empty-chat">
                        No messages yet. Start the conversation!
                    </div>
                `;
                return;
            }

            conversation.forEach(msg => {
                displayMessage(msg);
            });

            scrollToBottom();
        }

        // Display single message
        function displayMessage(msg) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${msg.isFromCurrentUser ? 'sent' : 'received'}`;

            const messageContent = document.createElement("div");
            messageContent.className = "message-content";

            const messageBubble = document.createElement("div");
            messageBubble.className = "message-bubble";
            messageBubble.textContent = msg.message;

            const messageTime = document.createElement("div");
            messageTime.className = "message-time";
            messageTime.textContent = formatTimestamp(msg.createdAt);

            messageContent.appendChild(messageBubble);
            messageContent.appendChild(messageTime);

            messageDiv.appendChild(messageContent);

            chatBox.appendChild(messageDiv);
        }

        // Send message to selected patient
        async function sendMessage() {
            const messageText = chatInput.value.trim();
            if (!messageText || !selectedPatientId) {
                console.log('Cannot send message - missing text or patient ID');
                if (!selectedPatientId) {
                    alert('Please select a patient first');
                }
                return;
            }

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    console.error('No token found');
                    return;
                }

                console.log('Sending message:', {
                    message: messageText,
                    receiverId: parseInt(selectedPatientId)
                });

                const response = await fetch('/api/messages/send', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: messageText,
                        receiverId: parseInt(selectedPatientId)
                    })
                });

                const data = await response.json();
                console.log('Send message response:', data);

                if (data.success) {
                    // Clear input
                    chatInput.value = '';

                    // Reload conversation to show new message
                    await loadConversation(selectedPatientId);
                } else {
                    console.error('Failed to send message:', data.error);
                    alert(`Failed to send message: ${data.error}`);
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Error sending message. Please try again.');
            }
        }

        // Delete chat with selected patient
        async function deleteChat() {
            if (!selectedPatientId) return;

            if (!confirm('Are you sure you want to delete this chat history?')) {
                return;
            }

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    console.error('No token found');
                    return;
                }

                const response = await fetch(`/api/messages/conversation/${selectedPatientId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                console.log('Delete chat response:', data);

                if (data.success) {
                    // Reset UI
                    patientSelect.value = '';
                    resetChatUI();

                    // Clear polling
                    if (pollingInterval) {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                    }
                } else {
                    console.error('Failed to delete chat:', data.error);
                    alert(`Failed to delete chat: ${data.error}`);
                }
            } catch (error) {
                console.error('Error deleting chat:', error);
                alert('Error deleting chat');
            }
        }

        // Polling for new messages
        function startPolling() {
            if (pollingInterval) return;

            pollingInterval = setInterval(async () => {
                if (selectedPatientId) {
                    await loadConversation(selectedPatientId);
                }
            }, 3000); // Poll every 3 seconds
        }

        // Reset chat UI
        function resetChatUI() {
            selectedPatientId = null;
            chatWith.textContent = 'Select a patient';
            deleteBtn.style.display = 'none';
            chatInput.disabled = true;
            sendBtn.disabled = true;
            chatBox.innerHTML = '<div class="empty-chat">Please select a patient to start chatting</div>';
        }

        // Helper functions
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Initializing doctor chat...');
            currentUser = getCurrentUserFromToken();
            console.log('Current user:', currentUser);

            if (currentUser) {
                loadPatients();
            } else {
                chatBox.innerHTML = '<div class="error-message">Please login to access chat</div>';
            }
        });

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
        });
    </script>
</body>
</html>
