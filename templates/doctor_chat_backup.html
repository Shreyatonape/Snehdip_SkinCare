<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .chat-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        .user-selection {
            background: #f8fafc;
            padding: 25px;
            border-bottom: 1px solid #e2e8f0;
            border-radius: 0 0 20px 20px;
        }

        .user-select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            color: #334155;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .user-select:hover {
            border-color: #4facfe;
            box-shadow: 0 8px 16px rgba(79, 172, 254, 0.15);
            transform: translateY(-2px);
        }

        .user-select:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.3);
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #ffffff;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            max-width: 75%;
            animation: slideInUp 0.3s ease;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
            margin-left: auto;
        }

        .message.received {
            justify-content: flex-start;
            margin-right: auto;
        }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.received .message-bubble {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 6px;
        }

        .message-time {
            font-size: 11px;
            color: #64748b;
            margin-top: 8px;
            font-weight: 500;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .message.received .message-time {
            text-align: left;
        }

        .chat-input-container {
            display: flex;
            padding: 25px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            border-radius: 0 0 20px 20px;
        }

        .chat-input {
            flex: 1;
            padding: 18px 25px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
            color: #334155;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .chat-input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
        }

        .send-btn {
            margin-left: 15px;
            padding: 18px 30px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            background: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .empty-chat {
            text-align: center;
            color: #64748b;
            padding: 60px 20px;
            font-size: 16px;
            background: #f8fafc;
            border-radius: 15px;
            margin: 20px;
            border: 2px dashed #cbd5e1;
        }

        .delete-btn {
            background: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(248, 113, 113, 0.3);
        }

        .delete-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(248, 113, 113, 0.4);
        }

        .delete-btn:disabled {
            background: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .error-message {
            background: linear-gradient(135deg, #fecaca 0%, #f87171 100%);
            color: #7f1d1d;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(248, 113, 113, 0.2);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 16px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #4facfe;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-message {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.2);
        }

        /* Scrollbar Styling */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .chat-container {
                margin: 0;
                border-radius: 0;
                height: 100vh;
            }

            .chat-header {
                border-radius: 0;
                padding: 15px;
                font-size: 16px;
            }

            .user-selection {
                padding: 15px;
                border-radius: 0;
            }

            .chat-messages {
                padding: 20px;
            }

            .chat-input-container {
                padding: 15px;
                border-radius: 0;
            }
        let currentUser = null;

        // Get current user from JWT token
        function getCurrentUserFromToken() {
            const token = localStorage.getItem('token');
            if (!token) {
                console.error('No token found in localStorage');
                return null;
            }

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return {
                    id: payload.user_id,
                    role: payload.role
                };
            } catch (error) {
                console.error('Error parsing token:', error);
                return null;
            }
        }

        // Fetch JWT token from server and store in localStorage
        async function fetchAndStoreToken() {
            try {
                const response = await fetch('/api/token');
                const data = await response.json();

                if (data.success && data.token) {
                    localStorage.setItem('token', data.token);
                    console.log('JWT token fetched and stored');
                    return true;
                } else {
                    console.error('Failed to fetch token:', data.error);
                    return false;
                }
            } catch (error) {
                console.error('Error fetching token:', error);
                return false;
            }
        }

        // Load registered patients using new API
        async function loadPatients() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    chatBox.innerHTML = '<div class="error-message">Please login first</div>';
                    return;
                }

                console.log('Loading registered patients...');
                // Use new API endpoint: GET /api/users?role=patient
                const response = await fetch('/api/users?role=patient', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                console.log('Patients API response:', data);

                if (data.success) {
                    patientSelect.innerHTML = '<option value="">-- Select Patient --</option>';

                    if (data.users.length === 0) {
                        patientSelect.innerHTML = '<option value="">-- No patients available --</option>';
                        chatBox.innerHTML = '<div class="info-message">No registered patients found. Please contact admin.</div>';
                        return;
                    }

                    // Populate dropdown with patients
                    data.users.forEach(patient => {
                        const option = document.createElement('option');
                        option.value = patient.id;
                        option.textContent = patient.username;
                        patientSelect.appendChild(option);
                    });

                    chatBox.innerHTML = '<div class="empty-chat">Please select a patient to start chatting</div>';
                    console.log(`Loaded ${data.users.length} patients`);
                } else {
                    console.error('Failed to load patients:', data.error);
                    chatBox.innerHTML = `<div class="error-message">Failed to load patients: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error loading patients:', error);
                chatBox.innerHTML = '<div class="error-message">Error loading patients. Please check your connection.</div>';
            }
        }

        // Handle patient selection
        patientSelect.addEventListener('change', async (e) => {
            selectedPatientId = e.target.value;
            console.log('Patient selected:', selectedPatientId);

            // Clear polling
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }

            if (!selectedPatientId) {
                resetChatUI();
                return;
            }

            const patientName = e.target.options[e.target.selectedIndex].textContent;
            chatWith.textContent = `Chat with ${patientName}`;
            deleteBtn.style.display = 'inline-block';

            // Load chat history using new API
            await loadChatHistory(selectedPatientId);

            // Enable chat input
            chatInput.disabled = false;
            sendBtn.disabled = false;

            // Start polling
            startPolling();
        });

        // Load chat history with selected patient
        async function loadChatHistory(patientId) {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    console.error('No token found');
                    return;
                }

                console.log('Loading chat history with patient:', patientId);
                // Use new API endpoint: GET /api/chat/history/<receiverId>
                const response = await fetch(`/api/chat/history/${patientId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                console.log('Chat history response:', data);

                if (data.success) {
                    displayMessages(data.messages);
                } else {
                    console.error('Failed to load chat history:', data.error);
                    chatBox.innerHTML = `<div class="error-message">Failed to load chat history: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
                chatBox.innerHTML = '<div class="error-message">Error loading chat history. Please try again.</div>';
            }
        }

        // Display messages
        function displayMessages(messages) {
            chatBox.innerHTML = '';

            if (messages.length === 0) {
                chatBox.innerHTML = `
                    <div class="empty-chat">
                        No messages yet. Start the conversation!
                    </div>
                `;
                return;
            }

            messages.forEach(msg => {
                displayMessage(msg);
            });

            scrollToBottom();
        }

        // Display single message
        function displayMessage(msg) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${msg.isFromCurrentUser ? 'sent' : 'received'}`;

            const messageContent = document.createElement("div");
            messageContent.className = "message-content";

            const messageBubble = document.createElement("div");
            messageBubble.className = "message-bubble";
            messageBubble.textContent = msg.message;

            const messageTime = document.createElement("div");
            messageTime.className = "message-time";
            messageTime.textContent = formatTimestamp(msg.createdAt);

            messageContent.appendChild(messageBubble);
            messageContent.appendChild(messageTime);

            messageDiv.appendChild(messageContent);

            chatBox.appendChild(messageDiv);
        }

        // Send message to selected patient
        async function sendMessage() {
            const messageText = chatInput.value.trim();
            if (!messageText || !selectedPatientId) {
                console.log('Cannot send message - missing text or patient ID');
                if (!selectedPatientId) {
                    alert('Please select a patient first');
                }
                return;
            }

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    console.error('No token found');
                    return;
                }

                console.log('Sending message:', {
                    message: messageText,
                    receiverId: parseInt(selectedPatientId),
                    senderRole: currentUser.role
                });

                // Use new API endpoint: POST /api/chat/send
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: messageText,
                        receiverId: parseInt(selectedPatientId),
                        senderRole: currentUser.role
                    })
                });

                const data = await response.json();
                console.log('Send message response:', data);

                if (data.success) {
                    // Clear input
                    chatInput.value = '';

                    // Reload chat history to show new message
                    await loadChatHistory(selectedPatientId);
                } else {
                    console.error('Failed to send message:', data.error);
                    alert(`Failed to send message: ${data.error}`);
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Error sending message. Please try again.');
            }
        }

        // Delete chat with selected patient
        async function deleteChat() {
            if (!selectedPatientId) return;

            if (!confirm('Are you sure you want to delete this chat history?')) {
                return;
            }

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    console.error('No token found');
                    return;
                }

                const response = await fetch(`/api/messages/conversation/${selectedPatientId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                console.log('Delete chat response:', data);

                if (data.success) {
                    // Reset UI
                    patientSelect.value = '';
                    resetChatUI();

                    // Clear polling
                    if (pollingInterval) {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                    }
                } else {
                    console.error('Failed to delete chat:', data.error);
                    alert(`Failed to delete chat: ${data.error}`);
                }
            } catch (error) {
                console.error('Error deleting chat:', error);
                alert('Error deleting chat');
            }
        }

        // Polling for new messages
        function startPolling() {
            if (pollingInterval) return;

            pollingInterval = setInterval(async () => {
                if (selectedPatientId) {
                    await loadChatHistory(selectedPatientId);
                }
            }, 3000); // Poll every 3 seconds
        }

        // Reset chat UI
        function resetChatUI() {
            selectedPatientId = null;
            chatWith.textContent = 'Select a patient';
            deleteBtn.style.display = 'none';
            chatInput.disabled = true;
            sendBtn.disabled = true;
            chatBox.innerHTML = '<div class="empty-chat">Please select a patient to start chatting</div>';
        }

        // Helper functions
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Initializing doctor chat...');

            // First, fetch and store JWT token from server
            const tokenFetched = await fetchAndStoreToken();

            if (tokenFetched) {
                currentUser = getCurrentUserFromToken();
                console.log('Current user:', currentUser);

                if (currentUser) {
                    loadPatients();
                } else {
                    chatBox.innerHTML = '<div class="error-message">Invalid token. Please login again.</div>';
                }
            } else {
                chatBox.innerHTML = '<div class="error-message">Please login to access chat</div>';
            }
        });

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
        });
    </script>
</body>
</html>
