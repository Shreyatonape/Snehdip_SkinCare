<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor | Patient Medical Records</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ================= DARK MEDICAL THEME ================= */
:root {
    --primary: #3b82f6;
    --primary-dark: #1e40af;
    --secondary: #06b6d4;
    --secondary-dark: #0891b2;

    --bg-main: linear-gradient(135deg, #020617, #0f172a, #020617);
    --card-bg: rgba(15, 23, 42, 0.78);
    --border: rgba(255, 255, 255, 0.08);
    --text-main: #e5e7eb;
    --text-muted: #94a3b8;
}

/* ================= GLOBAL ================= */
* {
    box-sizing: border-box;
}

body {
    font-family: "Poppins", sans-serif;
    background: var(--bg-main);
    margin: 0;
    color: var(--text-main);
}

/* ================= CONTAINER ================= */
.container {
    max-width: 1200px;
    margin: 60px auto;
    padding: 32px;
}

/* ================= HEADER ================= */
h1 {
    font-size: 30px;
    font-weight: 600;
    margin-bottom: 30px;
    text-align: center;
    color: #e0f2fe;
    text-shadow: 0 0 22px rgba(59,130,246,0.45);
}

/* ================= GRID ================= */
.records-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 26px;
}

/* ================= CARD ================= */
.record-card {
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.45);
    transition: 0.35s ease;
}

.record-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 35px 80px rgba(59,130,246,0.35);
}

/* ================= IMAGE ================= */
.record-card img {
    width: 100%;
    height: 190px;
    object-fit: cover;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 14px;
}

/* ================= CONTENT ================= */
.record-card h3 {
    font-size: 16px;
    margin: 8px 0;
    color: #e0f2fe;
}

.record-card p {
    font-size: 13px;
    margin: 6px 0;
    color: var(--text-muted);
}

/* ================= BUTTON ================= */
.btn {
    margin-top: 16px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    color: #ffffff;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    box-shadow: 0 10px 25px rgba(59,130,246,0.35);
    transition: 0.3s ease;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 45px rgba(59,130,246,0.55);
}

/* ================= DELETE BUTTON ================= */
.btn.delete {
    background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
    box-shadow: 0 10px 25px rgba(6,182,212,0.45);
}

.btn.delete:hover {
    box-shadow: 0 18px 45px rgba(6,182,212,0.7);
}

/* ================= BACK TO DASHBOARD BUTTON ================= */
.back-dashboard {
    display: block;
    width: fit-content;
    margin: 40px auto 0;
    padding: 12px 30px;
    border-radius: 999px;
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    color: #ffffff;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 12px 30px rgba(59,130,246,0.45);
    transition: all 0.3s ease;
}

.back-dashboard:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 50px rgba(59,130,246,0.65);
}

/* ================= MODAL ================= */
#recordModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(2, 6, 23, 0.75);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.modal-box {
    background: rgba(15, 23, 42, 0.9);
    border-radius: 22px;
    padding: 30px;
    width: 620px;
    max-width: 95%;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 40px 90px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="container">
    <h1>🩺 Patient Medical Records</h1>
    <div id="recordsContainer">Loading records...</div>

    <!-- BACK TO DASHBOARD BUTTON -->
    <a href="{{ url_for('doctor_dashboard') }}" class="back-dashboard">
        ⬅ Back to Dashboard
    </a>
</div>

<!-- MODAL -->
<div id="recordModal">
    <div class="modal-box">
        <h2 id="modalTitle"></h2>
        <p><strong>Diagnosis:</strong> <span id="modalDiagnosis"></span></p>
        <p><strong>Risk Level:</strong> <span id="modalRisk"></span></p>
        <p><strong>Confidence:</strong> <span id="modalConfidence"></span></p>
        <p><strong>Date:</strong> <span id="modalDate"></span></p>
        <hr>
        <p><strong>Reason:</strong> <span id="modalReason"></span></p>
        <p><strong>Symptoms:</strong> <span id="modalSymptoms"></span></p>
        <p><strong>Prevention:</strong> <span id="modalPrevention"></span></p>
        <button class="btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
async function loadDoctorRecords() {
    const list = document.getElementById("recordsContainer");
    const patientId = new URLSearchParams(window.location.search).get("patient_id");

    if (!patientId) {
        list.innerHTML = "<p>No patient selected.</p>";
        return;
    }

    const res = await fetch(`/api/records?patient_id=${patientId}`);
    const data = await res.json();

    if (!data.length) {
        list.innerHTML = "<p>No Medical Records Found</p>";
        return;
    }

    const grid = document.createElement("div");
    grid.className = "records-grid";

    data.forEach(r => {
        const card = document.createElement("div");
        card.className = "record-card";
        card.innerHTML = `
            <img src="${r.image_path}">
            <h3>Patient: {{ patient_name }}</h3>
            <p><strong>Diagnosis:</strong> ${r.diagnosis}</p>
            <p><strong>Risk:</strong> ${r.risk_level}</p>
            <p><strong>Confidence:</strong> ${(r.confidence * 100).toFixed(2)}%</p>
            <p><strong>Date:</strong> ${r.created_at}</p>
            <button class="btn delete" onclick="deleteRecord(${r.id})">🗑 Delete</button>
        `;
        grid.appendChild(card);
    });

    list.innerHTML = "";
    list.appendChild(grid);
}

async function deleteRecord(recordId) {
    if (!confirm("Are you sure you want to delete this record?")) return;

    const res = await fetch(`/api/records/${recordId}`, {
        method: "DELETE",
        credentials: "include"
    });

    const result = await res.json();
    if (result.success) {
        alert("Record deleted successfully");
        loadDoctorRecords();
    } else {
        alert("Failed to delete record");
    }
}

function closeModal() {
    document.getElementById("recordModal").style.display = "none";
}

loadDoctorRecords();
</script>

</body>
</html>
