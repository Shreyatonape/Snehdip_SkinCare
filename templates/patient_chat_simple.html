<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .user-selection {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .user-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: white;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            max-width: 70%;
        }

        .message.sent {
            justify-content: flex-end;
            margin-left: auto;
        }

        .message.received {
            justify-content: flex-start;
            margin-right: auto;
        }

        .message-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #dcf8c6;
            color: #303030;
        }

        .message.received .message-bubble {
            background: #e9ecef;
            color: #333;
        }

        .message-time {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .message.received .message-time {
            text-align: left;
        }

        .chat-input-container {
            display: flex;
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #ddd;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        .send-btn {
            margin-left: 10px;
            padding: 10px 20px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .send-btn:hover {
            background: #128c7e;
        }

        .send-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .empty-chat {
            text-align: center;
            color: #666;
            padding: 50px;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .delete-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <span id="chatWith">Select a doctor</span>
        <button id="deleteBtn" class="delete-btn" style="display: none;" onclick="deleteChat()">Delete Chat</button>
    </div>

    <div class="user-selection">
        <select class="user-select" id="doctorSelect">
            <option value="">-- Select Doctor --</option>
        </select>
    </div>

    <div class="chat-messages" id="chatBox">
        <div class="empty-chat">
            Please select a doctor to start chatting
        </div>
    </div>

    <div class="chat-input-container">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." disabled>
        <button class="send-btn" id="sendBtn" disabled>Send</button>
    </div>

    <script>
        let selectedDoctorId = null;
        let pollingInterval = null;

        const chatBox = document.getElementById("chatBox");
        const chatInput = document.getElementById("chatInput");
        const sendBtn = document.getElementById("sendBtn");
        const chatWith = document.getElementById("chatWith");
        const doctorSelect = document.getElementById("doctorSelect");
        const deleteBtn = document.getElementById("deleteBtn");

        // Load doctors
        async function loadDoctors() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/chat/users/doctor', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (data.success) {
                    doctorSelect.innerHTML = '<option value="">-- Select Doctor --</option>';
                    data.users.forEach(doctor => {
                        const option = document.createElement('option');
                        option.value = doctor.id;
                        option.textContent = doctor.username;
                        doctorSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading doctors:', error);
            }
        }

        // Handle doctor selection
        doctorSelect.addEventListener('change', async (e) => {
            selectedDoctorId = e.target.value;

            // Clear polling
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }

            if (!selectedDoctorId) {
                resetChatUI();
                return;
            }

            const doctorName = e.target.options[e.target.selectedIndex].textContent;
            chatWith.textContent = `Chat with ${doctorName}`;
            deleteBtn.style.display = 'inline-block';

            // Load messages
            await loadMessages(selectedDoctorId);

            // Enable chat input
            chatInput.disabled = false;
            sendBtn.disabled = false;

            // Start polling
            startPolling();
        });

        // Load messages
        async function loadMessages(doctorId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/chat/messages/${doctorId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (data.success) {
                    displayMessages(data.messages);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // Display messages
        function displayMessages(messages) {
            chatBox.innerHTML = '';

            if (messages.length === 0) {
                chatBox.innerHTML = '<div class="empty-chat">No messages yet. Start the conversation!</div>';
                return;
            }

            messages.forEach(msg => {
                displayMessage(msg);
            });

            scrollToBottom();
        }

        // Display single message
        function displayMessage(msg) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${msg.is_from_current_user ? 'sent' : 'received'}`;

            const messageBubble = document.createElement("div");
            messageBubble.className = "message-bubble";
            messageBubble.textContent = msg.message;

            const messageTime = document.createElement("div");
            messageTime.className = "message-time";
            messageTime.textContent = formatTime(msg.timestamp);

            messageDiv.appendChild(messageBubble);
            messageDiv.appendChild(messageTime);

            chatBox.appendChild(messageDiv);
        }

        // Send message
        async function sendMessage() {
            const messageText = chatInput.value.trim();
            if (!messageText || !selectedDoctorId) return;

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/chat/send', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: messageText,
                        receiver_id: parseInt(selectedDoctorId)
                    })
                });

                const data = await response.json();

                if (data.success) {
                    chatInput.value = '';
                    await loadMessages(selectedDoctorId);
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // Delete chat
        async function deleteChat() {
            if (!selectedDoctorId) return;

            if (!confirm('Are you sure you want to delete this chat history?')) {
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/chat/delete/${selectedDoctorId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (data.success) {
                    doctorSelect.value = '';
                    resetChatUI();

                    if (pollingInterval) {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                    }
                }
            } catch (error) {
                console.error('Error deleting chat:', error);
            }
        }

        // Polling
        function startPolling() {
            if (pollingInterval) return;

            pollingInterval = setInterval(async () => {
                if (selectedDoctorId) {
                    await loadMessages(selectedDoctorId);
                }
            }, 3000);
        }

        // Reset UI
        function resetChatUI() {
            selectedDoctorId = null;
            chatWith.textContent = 'Select a doctor';
            deleteBtn.style.display = 'none';
            chatInput.disabled = true;
            sendBtn.disabled = true;
            chatBox.innerHTML = '<div class="empty-chat">Please select a doctor to start chatting</div>';
        }

        // Helper functions
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDoctors();
        });

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
        });
    </script>
</body>
</html>
