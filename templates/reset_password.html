<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<style>
body {font-family:Poppins;background:#0d1b2a;color:white;text-align:center;padding-top:120px;}
form {background:#1b263b;padding:30px;border-radius:15px;max-width:400px;margin:auto;}
input,button {width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none;}
button {background:#42a5f5;color:white;font-size:16px;cursor:pointer;}
</style>
</head>
<body>

<h2>Reset Password</h2>

<form method="POST">
  <input type="password" name="password" placeholder="New Password" required>
  <input type="password" name="confirm_password" placeholder="Confirm Password" required>
  <button type="submit">Reset Password</button>
</form>

</body>
</html>
